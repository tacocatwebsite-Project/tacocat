<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07101f">
<title>TacoCat Practice Results</title>
<style>
:root{--bg:#07101f;--card:#121c31;--line:#2b3a60;--text:#f6f8ff;--muted:#aab5d0;--accent:#6de7ba;--danger:#ff7070}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:radial-gradient(circle at top,#203365,#07101f 58%);color:var(--text)}
body{padding:max(18px,env(safe-area-inset-top)) 16px max(24px,env(safe-area-inset-bottom))}
.wrap{max-width:950px;margin:auto}.card{background:rgba(18,28,49,.98);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:0 18px 55px rgba(0,0,0,.35)}
h1,h2{margin:0 0 10px}p{color:var(--muted);line-height:1.5}input,button{font:inherit}
input{width:100%;min-height:50px;border-radius:12px;border:1px solid var(--line);background:#0b1425;color:var(--text);padding:12px;font-size:16px}
button{min-height:48px;border:0;border-radius:12px;padding:12px 14px;font-weight:800;cursor:pointer;touch-action:manipulation}
.primary{background:var(--accent);color:#06140f}.secondary{background:#0d172a;color:var(--text);border:1px solid var(--line)}.danger{background:var(--danger);color:white}
.hidden{display:none!important}.gap{margin-top:12px}.full{width:100%}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}.stat{padding:14px;border:1px solid var(--line);border-radius:12px;background:#0d172a}.stat b{display:block;font-size:25px}
.table{overflow:auto;border:1px solid var(--line);border-radius:12px}table{width:100%;min-width:650px;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left}th{background:#0f192d}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.actions button{flex:1;min-width:170px}
.note{padding:12px;border:1px solid var(--line);border-radius:12px;background:#0d172a;color:var(--muted);margin:12px 0}
</style>
</head>
<body>
<div class="wrap">
  <div id="login" class="card">
    <h1>Private Results Panel</h1>
    <p>Enter the practice admin code.</p>
    <input id="code" type="password" placeholder="Admin code">
    <button id="loginBtn" class="primary full gap" type="button">Enter</button>
    <button id="backBtn" class="secondary full gap" type="button">Back to Quiz</button>
    <div class="note">Practice code: <strong>TEST60</strong></div>
  </div>

  <div id="dashboard" class="card hidden">
    <div class="top"><div><h1>Practice Results</h1><p>Ranking by score, then fastest completion time.</p></div><button id="logoutBtn" class="secondary" type="button">Log Out</button></div>
    <div class="grid"><div class="stat"><b id="count">0</b><span>Participants</span></div><div class="stat"><b id="fastest">—</b><span>Fastest Time</span></div></div>
    <div class="table"><table><thead><tr><th>Rank</th><th>Username</th><th>Score</th><th>Time</th><th>Submitted</th></tr></thead><tbody id="rows"></tbody></table></div>
    <div class="actions">
      <button id="sampleBtn" class="secondary" type="button">Add Sample Results</button>
      <button id="exportBtn" class="secondary" type="button">Export CSV</button>
      <button id="clearBtn" class="danger" type="button">Clear Results</button>
    </div>
  </div>
</div>

  <!-- Supabase library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Your Supabase connection -->
<script src="/assets/js/supabase.js"></script>


 <!-- Admin page code -->
<script>
(function(){
"use strict";
var KEY="tacocat_practice_results_v2",CODE="TEST60";
function el(id){return document.getElementById(id)}
function read(){try{return JSON.parse(localStorage.getItem(KEY)||"[]")}catch(e){return[]}}
function write(x){localStorage.setItem(KEY,JSON.stringify(x))}
function ranked(){return read().sort(function(a,b){return b.score-a.score||a.time-b.time||new Date(a.submittedAt)-new Date(b.submittedAt)})}
function draw(){
 var d=ranked();el("count").textContent=d.length;el("fastest").textContent=d.length?Math.min.apply(null,d.map(function(x){return x.time})).toFixed(2)+"s":"—";
 var html="";d.forEach(function(r,i){html+="<tr><td>#"+(i+1)+"</td><td>"+safe(r.username)+"</td><td><strong>"+r.score+"/10</strong></td><td>"+r.time.toFixed(2)+"s</td><td>"+new Date(r.submittedAt).toLocaleString()+"</td></tr>"});
 el("rows").innerHTML=html||'<tr><td colspan="5">No results yet.</td></tr>'
}
function safe(s){return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]})}
function login(){if(el("code").value!==CODE){alert("Incorrect code.");return}el("login").classList.add("hidden");el("dashboard").classList.remove("hidden");draw()}
function exportCsv(){var d=ranked();if(!d.length){alert("No results to export.");return}var lines=["Rank,Username,Score,TimeSeconds,SubmittedAt"];d.forEach(function(r,i){lines.push([i+1,'"'+String(r.username).replace(/"/g,'""')+'"',r.score,r.time,r.submittedAt].join(","))});var blob=new Blob([lines.join("\n")],{type:"text/csv;charset=utf-8"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="tacocat-practice-results.csv";a.click();URL.revokeObjectURL(a.href)}
el("loginBtn").addEventListener("click",login);
el("backBtn").addEventListener("click",function(){window.location.href="../"});
el("logoutBtn").addEventListener("click",function(){el("dashboard").classList.add("hidden");el("login").classList.remove("hidden");el("code").value=""});
el("sampleBtn").addEventListener("click",function(){var d=read(),n=["Pilot","Shadow","Explorer"],s=[9,10,8],t=[42.1,38.8,47.5];for(var i=0;i<n.length;i++)d.push({id:Date.now()+i,username:n[i],score:s[i],time:t[i],submittedAt:new Date(Date.now()-i*60000).toISOString(),timedOut:false});write(d);draw()});
el("exportBtn").addEventListener("click",exportCsv);
el("clearBtn").addEventListener("click",function(){if(confirm("Clear every practice result?")){localStorage.removeItem(KEY);draw()}});
})();
</script>
</body>
</html>
