<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07101f">
<title>TacoCat Practice Quiz</title>
<style>
:root{--bg:#07101f;--card:#121c31;--line:#2b3a60;--text:#f6f8ff;--muted:#aab5d0;--accent:#6de7ba;--warn:#ff7070}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:radial-gradient(circle at top,#203365,#07101f 58%);color:var(--text)}
body{padding:max(18px,env(safe-area-inset-top)) 16px max(24px,env(safe-area-inset-bottom))}
.wrap{max-width:720px;margin:auto}
.card{background:rgba(18,28,49,.98);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:0 18px 55px rgba(0,0,0,.35)}
h1,h2{margin:0 0 10px}
p{color:var(--muted);line-height:1.5}
input,button{font:inherit}
input{width:100%;min-height:50px;border-radius:12px;border:1px solid var(--line);background:#0b1425;color:var(--text);padding:12px;font-size:16px}
button{width:100%;min-height:50px;border:0;border-radius:12px;padding:12px 14px;font-weight:800;cursor:pointer;touch-action:manipulation}
.primary{background:var(--accent);color:#06140f}
.secondary{background:#0d172a;color:var(--text);border:1px solid var(--line)}
.hidden{display:none!important}
.note{padding:12px;border:1px solid var(--line);border-radius:12px;background:#0d172a;color:var(--muted);margin:12px 0}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px}
.timer{font-size:32px;font-weight:900}
.timer.low{color:var(--warn)}
.question{font-size:22px;line-height:1.35;margin:20px 0 14px}
.option{margin:8px 0;text-align:left;background:#0f192d;color:var(--text);border:1px solid var(--line)}
.option.selected{background:#17382f;border-color:var(--accent)}
.gap{margin-top:12px}
a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <div id="startCard" class="card">
    <h1>TacoCat Practice Quiz</h1>
    <p>Enter a username and answer 10 easy questions in 60 seconds.</p>
    <div class="note">Practice version. Your score stays hidden after submission.</div>
    <input id="username" autocomplete="off" autocapitalize="none" placeholder="X or Telegram username">
    <button id="startBtn" class="primary gap" type="button">Start Quiz</button>
    <button id="adminBtn" class="secondary gap" type="button">Private Results Panel</button>
  </div>

  <div id="quizCard" class="card hidden">
    <div class="top"><strong id="progress">Question 1 of 10</strong><span id="timer" class="timer">60</span></div>
    <div id="question" class="question"></div>
    <div id="options"></div>
    <button id="nextBtn" class="primary gap" type="button" disabled>Next</button>
  </div>

  <div id="doneCard" class="card hidden">
    <h2>Mission Complete</h2>
    <p>Your result was submitted and remains hidden.</p>
    <div id="doneNote" class="note"></div>
    <button id="againBtn" class="primary gap" type="button">Try Another Username</button>
    <button id="doneAdminBtn" class="secondary gap" type="button">Open Private Panel</button>
  </div>
</div>
<script>
(function(){
"use strict";
var KEY="tacocat_practice_results_v2";
var bank=[
["What is 1 + 1?",["2","3","4","1"],"2"],
["What is 2 + 2?",["4","3","5","6"],"4"],
["How many days are in a week?",["7","6","5","8"],"7"],
["Which animal says meow?",["Cat","Dog","Duck","Cow"],"Cat"],
["How many legs does a cat have?",["4","2","6","8"],"4"],
["What is 5 - 2?",["3","4","2","5"],"3"],
["What is the first letter of the alphabet?",["A","B","C","D"],"A"],
["How many months are in a year?",["12","10","11","13"],"12"],
["What comes after 9?",["10","8","11","12"],"10"],
["Which one is a fruit?",["Apple","Table","Shoe","Pencil"],"Apple"],
["What is 3 × 2?",["6","5","4","8"],"6"],
["What is 10 ÷ 2?",["5","4","6","10"],"5"]
];
var qs=[],answers=[],index=0,seconds=60,timer=null,startAt=0,username="";
function el(id){return document.getElementById(id)}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=b[i];b[i]=b[j];b[j]=t}return b}
function read(){try{return JSON.parse(localStorage.getItem(KEY)||"[]")}catch(e){return[]}}
function write(x){localStorage.setItem(KEY,JSON.stringify(x))}
function show(id){["startCard","quizCard","doneCard"].forEach(function(x){el(x).classList.add("hidden")});el(id).classList.remove("hidden")}
function begin(){
 username=el("username").value.trim();
 if(!username){alert("Please enter a username.");return}
 qs=shuffle(bank).slice(0,10).map(function(x){return {q:x[0],a:shuffle(x[1]),c:x[2]}});answers=[];index=0;seconds=60;startAt=Date.now();
 show("quizCard");render();tick();timer=setInterval(function(){seconds--;tick();if(seconds<=0)finish(true)},1000)
}
function tick(){el("timer").textContent=seconds;el("timer").className=seconds<=10?"timer low":"timer"}
function render(){
 var q=qs[index];el("progress").textContent="Question "+(index+1)+" of 10";el("question").textContent=q.q;el("options").innerHTML="";
 el("nextBtn").disabled=true;el("nextBtn").textContent=index===9?"Submit":"Next";
 q.a.forEach(function(choice){var b=document.createElement("button");b.type="button";b.className="option";b.textContent=choice;
 b.addEventListener("click",function(){Array.prototype.forEach.call(document.querySelectorAll(".option"),function(x){x.classList.remove("selected")});b.classList.add("selected");answers[index]=choice;el("nextBtn").disabled=false});
 el("options").appendChild(b)})
}
function next(){if(!answers[index])return;if(index===9)finish(false);else{index++;render()}}
function finish(timedOut){
 if(timer){clearInterval(timer);timer=null}
 var elapsed=Math.min((Date.now()-startAt)/1000,60),score=0;
 qs.forEach(function(q,i){if(answers[i]===q.c)score++});
 var rows=read();rows.push({id:Date.now()+Math.random(),username:username,score:score,time:Number(elapsed.toFixed(2)),submittedAt:new Date().toISOString(),timedOut:timedOut});write(rows);
 el("doneNote").textContent="Result saved for "+username+".";show("doneCard")
}
function admin(){window.location.href="./admin/"}
el("startBtn").addEventListener("click",begin);
el("nextBtn").addEventListener("click",next);
el("againBtn").addEventListener("click",function(){el("username").value="";show("startCard")});
el("adminBtn").addEventListener("click",admin);
el("doneAdminBtn").addEventListener("click",admin);
})();
</script>
</body>
</html>
