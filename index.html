<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TacoCat Practice Quiz</title>
  <link rel="stylesheet" href="./assets/css/quiz.css">
</head>
<body>
  <main class="wrap">
    <section id="startCard" class="card">
      <h1>TacoCat Practice Quiz</h1>
      <p>Answer 10 questions before the 60-second timer ends.</p>

      <label for="username">Username</label>
      <input id="username" type="text" minlength="2" maxlength="50" placeholder="Enter your username">

      <button id="startBtn" type="button">Start Quiz</button>
      <a href="./leaderboard/">View Top 10 Leaderboard</a>
      <button id="adminBtn" type="button">Admin Results</button>
    </section>

    <section id="quizCard" class="card hidden">
      <div class="top">
        <strong id="progress">Question 1 of 10</strong>
        <div id="timer">60</div>
      </div>

      <h2 id="question"></h2>
      <div id="options"></div>
      <button id="nextBtn" type="button" disabled>Next</button>
    </section>

    <section id="doneCard" class="card hidden">
      <h1>Mission Complete</h1>
      <p id="doneNote">Your result has been submitted.</p>

      <a href="./leaderboard/">View Leaderboard</a>
      <button id="againBtn" type="button">Try Again</button>
      <button id="doneAdminBtn" type="button">Admin Results</button>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/js/supabase.js"></script>
  <script src="./assets/js/quiz.js"></script>
</body>
</html>
