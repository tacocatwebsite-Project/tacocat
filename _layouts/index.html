<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz Demo #2</title>
  <link rel="stylesheet" href="./quiz.css" />
</head>
<body>
  <main class="quiz-shell">
    <section id="start-screen" class="card">
      <p class="eyebrow">LIVE QUIZ DEMO</p>
      <h1>Quiz #2</h1>
      <p>Answer 10 general-knowledge questions before the 60-second timer expires.</p>

      <label for="username">Name or username</label>
      <input id="username" maxlength="50" autocomplete="off" placeholder="Enter your name" />

      <button id="start-btn">Start Quiz</button>
      <p id="start-error" class="error" role="alert"></p>
    </section>

    <section id="quiz-screen" class="card hidden" aria-live="polite">
      <header class="quiz-header">
        <div>
          <p class="eyebrow">QUIZ #2</p>
          <h2 id="progress-label">Question 1 of 10</h2>
        </div>
        <div id="timer" class="timer">60</div>
      </header>

      <div class="progress-track">
        <div id="progress-bar" class="progress-bar"></div>
      </div>

      <h3 id="question-text"></h3>
      <div id="answers" class="answers"></div>

      <button id="next-btn" disabled>Next</button>
    </section>

    <section id="complete-screen" class="card hidden">
      <p class="eyebrow">QUIZ SUBMITTED</p>
      <h1>Complete</h1>
      <p>Your answers were submitted successfully.</p>
      <p class="muted">The score is hidden from participants.</p>
      <p id="submit-status"></p>
    </section>
  </main>

  <script type="module" src="./quiz.js"></script>
</body>
</html>
